<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>User Posts | Black & White</title>
    <link rel="stylesheet" href="Style.css">
</head>
<body>
<div class="dashboard">
    <div class="app-grid">
        <div class="users-panel">
            <div class="users-header">
                <h2>All users</h2>
            </div>
            <ul class="user-list" id="userListContainer"></ul>
        </div>
        <div class="posts-panel">
            <div class="posts-header">
                <h2 id="postsHeaderTitle">Posts</h2>
            </div>
            <div id="postsContainer" class="posts-container">
                <div class="empty-message">Select a user to view posts</div>
            </div>
        </div>
    </div>
    <footer>filter · user.id → posts.userId</footer>
</div>

<script>

    const USERS_API = 'https://jsonplaceholder.typicode.com/users';
    const POSTS_API = 'https://jsonplaceholder.typicode.com/posts';


    const userListEl = document.getElementById('userListContainer');
    const postsContainer = document.getElementById('postsContainer');
    const postsHeaderTitle = document.getElementById('postsHeaderTitle');


    function escapeHtml(str) {
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }


    async function fetchUsers() {
        const response = await fetch(USERS_API);
        if (!response.ok) {
            throw new Error(`Failed to fetch users: ${response.status}`);
        }
        return await response.json();
    }


    async function fetchPosts() {
        const response = await fetch(POSTS_API);
        if (!response.ok) {
            throw new Error(`Failed to fetch posts: ${response.status}`);
        }
        return await response.json();
    }


    function getPostsByUserId(posts, userId) {
        return posts.filter(post => post.userId === userId);
    }


    function renderPostsForUser(posts, userId, userName) {
        const filteredPosts = getPostsByUserId(posts, userId);
        postsHeaderTitle.innerHTML = `Posts by <span>${escapeHtml(userName)}</span>  ·  ${filteredPosts.length} entries`;

        if (!filteredPosts.length) {
            postsContainer.innerHTML = `<div class="empty-message">No posts written by this user</div>`;
            return;
        }

        const postsHTML = filteredPosts.map(post => `
            <div class="post-card">
                <div class="post-title">${escapeHtml(post.title)}</div>
                <div class="post-body">${escapeHtml(post.body)}</div>
            </div>
        `).join('');

        postsContainer.innerHTML = postsHTML;
    }


    function buildUserList(users, posts) {
        userListEl.innerHTML = '';

        users.forEach(user => {
            const userPostsCount = getPostsByUserId(posts, user.id).length;
            const li = document.createElement('li');
            li.className = 'user-item';
            li.setAttribute('data-user-id', user.id);
            li.setAttribute('data-user-name', user.name);

            li.innerHTML = `
                <span class="user-name">${escapeHtml(user.name)}</span>
                <span class="post-count">${userPostsCount} posts</span>
            `;

            li.addEventListener('click', (e) => {
                e.stopPropagation();
                document.querySelectorAll('.user-item').forEach(item => item.classList.remove('active'));
                li.classList.add('active');
                renderPostsForUser(posts, user.id, user.name);
            });

            userListEl.appendChild(li);
        });


        if (users.length > 0 && userListEl.firstChild) {
            userListEl.firstChild.classList.add('active');
            renderPostsForUser(posts, users[0].id, users[0].name);
        }
    }


    function showLoading() {
        userListEl.innerHTML = '<div class="loading-message">Loading users...</div>';
        postsContainer.innerHTML = '<div class="empty-message">Loading posts...</div>';
    }

    function showError(message) {
        userListEl.innerHTML = `<div class="error-message">${escapeHtml(message)}</div>`;
        postsContainer.innerHTML = `<div class="error-message">${escapeHtml(message)}</div>`;
    }


    async function init() {
        showLoading();
        try {

            const [users, posts] = await Promise.all([fetchUsers(), fetchPosts()]);

            if (!users.length) {
                throw new Error('No users data received');
            }
            if (!posts.length) {
                throw new Error('No posts data received');
            }

            buildUserList(users, posts);
        } catch (error) {
            console.error('Initialization error:', error);
            showError(error.message || 'Failed to load data. Please try again later.');
        }
    }


    init();
</script>
</body>
</html>
